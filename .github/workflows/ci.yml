name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyse:
    runs-on: ubuntu-latest
    name: PHPStan

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Run static analysis
        run: composer analyse

  test:
    runs-on: ubuntu-latest
    name: PHPUnit (PHP ${{ matrix.php }})

    strategy:
      matrix:
        php: ["8.1", "8.2", "8.3"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Run tests
        run: composer test

  build:
    name: Build Plugin ZIP
    runs-on: ubuntu-latest
    needs: [analyse, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read plugin version
        id: version
        run: |
          VERSION=$(grep -m1 "^ \* Version:" devpulse.php | awk '{print $3}')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build ZIP
        run: |
          mkdir -p dist/devpulse
          rsync -r \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitattributes' \
            --exclude='.gitignore' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='vendor' \
            --exclude='tests' \
            --exclude='phpstan.*' \
            --exclude='README.md' \
            --exclude='dist' \
            . dist/devpulse/
          cd dist
          zip -r "devpulse-${{ steps.version.outputs.version }}.zip" devpulse/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devpulse-${{ steps.version.outputs.version }}
          path: dist/devpulse-${{ steps.version.outputs.version }}.zip
          retention-days: 90

      - name: Attach ZIP to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/devpulse-${{ steps.version.outputs.version }}.zip
